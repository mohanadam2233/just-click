services:
  db:
    image: postgres:16-alpine
    container_name: justclick-db
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: justclick-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: justclick-backend
    env_file:
      - ./backend/.env
    environment:
      # override hostnames so docker networking always works
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      PYTHONPATH: /app/src
      FLASK_APP: cmcp.wsgi:app
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_media:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: justclick-frontend
    env_file:
      - ./frontend/.env.local
    environment:
      FLASK_ORIGIN: http://backend:7000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  redisdata:
  backend_media: